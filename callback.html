<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
</head>
<body>
<p id="code_p">Code goes here</p>
<p id="state_p">State goes here</p>
<script>
    const params = new URLSearchParams(window.location.search);
    console.log("callback called");
    const code = params.get("code");
    const state = params.get("state");
    if (code){
//        sessionStorage.setItem("code", code);
	let code_par = document.getElementById("code_p");
	code_par.innerText = code;
	}
    else{
	let code_par = document.getElementById("code_p");
	code_par.innerText = "Code not found";
	}
    if (state){
//        sessionStorage.setItem("state", state);
	let state_par = document.getElementById("state_p");
	state_par.innerText = state;
    }
    else{
	let state_par = document.getElementById("state_p");
	state_par.innerText = "State not found";
    }
    if (window.opener) {
        window.opener.postMessage(
            { code: code, state: state },
            window.location.origin
        );
        window.close();
    }
</script>

</body>
</html>
